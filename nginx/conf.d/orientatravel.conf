# orientatravel.uz — neighbouring project on the shared VPS.
#
# Single Next.js container (`orientatravel-app-1` on port 3000); medbook's
# nginx terminates TLS and reverse-proxies the public traffic. The container
# joins `medbook_default` so name-based DNS works.
#
# HTTP→HTTPS redirect + ACME HTTP-01 passthrough are handled by the catch-all
# `listen 80 default_server` block in ../nginx.conf.

upstream orientatravel_app {
  server orientatravel-app-1:3000;
  keepalive 32;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name orientatravel.uz www.orientatravel.uz;

  ssl_certificate     /etc/letsencrypt/live/orientatravel.uz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/orientatravel.uz/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;

  client_max_body_size 25m;

  # The app does not emit its own security headers, so nginx adds them.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options    "nosniff" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

  location / {
    proxy_pass              http://orientatravel_app;
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Forwarded-Host  $host;
    proxy_set_header        Connection        "";
    proxy_read_timeout      60s;
  }

  # ACME challenge passthrough for cert renewals while HTTPS is live.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    allow all;
  }
}
