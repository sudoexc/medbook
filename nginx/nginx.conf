# MedBook / NeuroFax — nginx reverse proxy.
#
# Responsibilities:
#   1. TLS termination (certs from /etc/letsencrypt, renewed by certbot sidecar).
#   2. HTTP/2 + gzip.
#   3. Reverse proxy to app:3000 over the compose network.
#   4. Passthrough of ACME HTTP-01 challenges (/.well-known/acme-challenge).
#   5. SSE-friendly tuning on /api/events (no buffering, long keepalive).
#   6. Security headers in addition to the ones Next.js already sets.

worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server_tokens off;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  types_hash_max_size 2048;
  client_max_body_size 25m;            # documents / signatures
  keepalive_timeout 75;

  # Log to stdout/stderr so Docker picks them up.
  log_format  main  '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time ut=$upstream_response_time';
  access_log /dev/stdout main;
  error_log  /dev/stderr warn;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    application/rss+xml
    application/x-font-ttf
    font/woff
    font/woff2;

  # Upstream with keepalive pool.
  upstream medbook_app {
    server app:3000;
    keepalive 64;
  }

  # --- HTTP: ACME + redirect to HTTPS ---
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME http-01 challenge (certbot webroot lives in shared volume).
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      allow all;
    }

    # Everything else → HTTPS.
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # --- HTTPS: main vhost ---
  # Replace `neurofax.uz` with LETSENCRYPT_DOMAIN via `envsubst` in deploy.sh
  # if you're running more than one domain off the same nginx.
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name neurofax.uz www.neurofax.uz;

    ssl_certificate     /etc/letsencrypt/live/neurofax.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neurofax.uz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers — Next.js sets most already, but nginx layers these
    # for non-Next routes (static files, errors, etc.).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # --- SSE endpoint: disable all proxy buffering ---
    location = /api/events {
      proxy_pass              http://medbook_app;
      proxy_http_version      1.1;
      proxy_set_header        Host              $host;
      proxy_set_header        X-Real-IP         $remote_addr;
      proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;
      proxy_set_header        Connection        "";
      proxy_buffering         off;
      proxy_cache             off;
      proxy_read_timeout      1h;
      proxy_send_timeout      1h;
      chunked_transfer_encoding on;
    }

    # --- WebSocket upgrade path (future-proofing for BullMQ board / etc.) ---
    location /api/ws {
      proxy_pass              http://medbook_app;
      proxy_http_version      1.1;
      proxy_set_header        Upgrade           $http_upgrade;
      proxy_set_header        Connection        "upgrade";
      proxy_set_header        Host              $host;
      proxy_read_timeout      1h;
    }

    # --- Everything else → app ---
    location / {
      proxy_pass              http://medbook_app;
      proxy_http_version      1.1;
      proxy_set_header        Host              $host;
      proxy_set_header        X-Real-IP         $remote_addr;
      proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;
      proxy_set_header        Connection        "";
      proxy_read_timeout      60s;
    }

    # ACME challenge for renewals while HTTPS is live.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      allow all;
    }
  }
}
