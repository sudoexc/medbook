# rtxshop.uz — neighbouring project on the shared VPS.
#
# This medbook nginx terminates TLS for rtxshop too because both projects'
# containers share the `medbook_default` network and only one container can
# bind host ports 80/443. The rtxshop frontend (Next.js) handles its own
# routing + talks to the backend internally; we only proxy public traffic.
#
# Container DNS: only the full Compose container name (`rtxshop-frontend-1`)
# resolves on `medbook_default` — the service-name alias is project-local.
#
# HTTP→HTTPS redirect + ACME HTTP-01 passthrough are handled by the catch-all
# `listen 80 default_server` block in ../nginx.conf, so no port-80 block here.

upstream rtxshop_frontend {
  server rtxshop-frontend-1:3000;
  keepalive 32;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name rtxshop.uz www.rtxshop.uz;

  ssl_certificate     /etc/letsencrypt/live/rtxshop.uz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/rtxshop.uz/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;

  client_max_body_size 25m;

  # rtxshop frontend already emits HSTS, CSP, X-Frame-Options, etc. — no
  # `add_header` here to avoid duplicates.

  location / {
    proxy_pass              http://rtxshop_frontend;
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Forwarded-Host  $host;
    proxy_set_header        Connection        "";
    proxy_read_timeout      60s;
  }

  # ACME challenge passthrough for cert renewals while HTTPS is live.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    allow all;
  }
}
