name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Dummy env so `prisma generate` + build don't complain about missing vars.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      AUTH_SECRET: ci-dummy-auth-secret-${{ github.run_id }}
      AUTH_URL: http://localhost:3000
      APP_SECRET: ci-dummy-app-secret-${{ github.run_id }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Verify standalone output
        run: |
          test -d .next/standalone || { echo "::error::missing .next/standalone"; exit 1; }
          test -f .next/standalone/server.js || { echo "::error::missing .next/standalone/server.js"; exit 1; }
          ls -la .next/standalone | head -20

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medbook
          POSTGRES_PASSWORD: medbook
          POSTGRES_DB: medbook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U medbook -d medbook_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://medbook:medbook@localhost:5432/medbook_test
      DATABASE_URL_TEST: postgresql://medbook:medbook@localhost:5432/medbook_test
      AUTH_SECRET: e2e-auth-secret-32bytes-minimum-padding
      APP_SECRET: e2e-app-secret-32bytes-minimum-padding!
      AUTH_URL: http://127.0.0.1:3001
      E2E_PORT: "3001"
      E2E_BASE_URL: http://127.0.0.1:3001
      NEXT_TELEMETRY_DISABLED: "1"
      CI: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate + migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed e2e DB
        run: npm run e2e:seed

      - name: Run e2e suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: ignore
